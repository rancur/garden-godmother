name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Security Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 5"
          direct_prompt: |
            Review this PR for security issues. Focus on:
            - SQL injection, XSS, CSRF vulnerabilities
            - Authentication/authorization bypasses
            - Hardcoded secrets or credentials
            - Path traversal or file access issues
            - Dependency vulnerabilities
            - Input validation gaps

            If no security issues are found, comment "No security issues found."
            If issues are found, list them with severity (critical/high/medium/low) and suggested fixes.
