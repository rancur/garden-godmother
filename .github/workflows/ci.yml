name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-api:
    name: API — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: garden-api/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff (new/changed files only)
        run: |
          # On PRs, only lint changed files to avoid blocking on legacy lint debt
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.py' | xargs -r ruff check
          else
            # On push to main, run full lint but don't fail (tracking lint debt)
            ruff check . || true
          fi

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Build reference database
        run: python create_reference_db.py
        # This catches knowledge base errors like #137

  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: garden-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3402

  docker-build:
    name: Docker — Build & Verify
    runs-on: ubuntu-latest
    needs: [lint-and-test-api, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t garden-api:test ./garden-api

      - name: Build Web image
        run: docker build -t garden-web:test ./garden-web --build-arg NEXT_PUBLIC_API_URL=http://localhost:3402

      - name: Verify API container starts
        run: |
          docker run -d --name api-test \
            -e GG_DB_PATH=/app/data/garden.db \
            -p 3402:3402 \
            garden-api:test
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            if docker exec api-test python -c "import urllib.request; urllib.request.urlopen('http://localhost:3402/api/plants')" 2>/dev/null; then
              echo "API is responding"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "API failed to start in time"
              docker logs api-test
              exit 1
            fi
            sleep 1
          done

      - name: Verify reference DB exists in image
        run: |
          docker exec api-test python -c "
          import sqlite3
          conn = sqlite3.connect('/app/plants_reference.db')
          count = conn.execute('SELECT COUNT(*) FROM plants').fetchone()[0]
          print(f'Reference DB has {count} plants')
          assert count > 0, 'Reference DB is empty!'
          conn.close()
          "

      - name: Smoke test — health endpoint
        run: |
          docker exec api-test python -c "
          import urllib.request, json
          resp = urllib.request.urlopen('http://localhost:3402/api/health')
          print(f'Health check: {resp.status}')
          assert resp.status == 200, f'Health check failed: {resp.status}'
          "

      - name: Cleanup
        if: always()
        run: docker rm -f api-test || true
