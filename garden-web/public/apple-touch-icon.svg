<svg width="192" height="192" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for touch icon -->
  <rect width="64" height="64" rx="14" fill="#f0fdf4"/>
  <!-- Wand/stem -->
  <path d="M20 58 C22 50, 28 38, 32 28 C34 22, 35 16, 34 10" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M21 57 C23 49, 29 37, 33 27 C35 21, 36 15, 35 9" stroke="#40916c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Left leaf -->
  <path d="M28 36 C22 34, 16 30, 14 24 C18 26, 24 30, 28 34" fill="#40916c" stroke="#2d6a4f" stroke-width="0.8"/>
  <path d="M27 35 C23 32, 18 28, 16 25" stroke="#2d6a4f" stroke-width="0.5" fill="none" opacity="0.6"/>
  <!-- Right leaf -->
  <path d="M33 30 C38 26, 44 24, 48 22 C44 28, 38 30, 33 31" fill="#52b788" stroke="#2d6a4f" stroke-width="0.8"/>
  <path d="M34 30 C38 27, 42 25, 46 23" stroke="#2d6a4f" stroke-width="0.5" fill="none" opacity="0.6"/>
  <!-- Small leaf bud near top -->
  <path d="M34 16 C37 13, 40 12, 42 11 C40 15, 37 16, 34 17" fill="#52b788" stroke="#2d6a4f" stroke-width="0.6"/>
  <!-- Star/sparkle at wand tip -->
  <g transform="translate(33, 6)">
    <path d="M0 -6 L1.2 -1.8 L6 0 L1.2 1.8 L0 6 L-1.2 1.8 L-6 0 L-1.2 -1.8 Z" fill="#d4a574" stroke="#c9956b" stroke-width="0.4"/>
    <circle cx="0" cy="0" r="1.8" fill="#d4a574" opacity="0.6"/>
  </g>
  <!-- Small sparkle upper left -->
  <g transform="translate(24, 4)">
    <path d="M0 -2.5 L0.6 -0.8 L2.5 0 L0.6 0.8 L0 2.5 L-0.6 0.8 L-2.5 0 L-0.6 -0.8 Z" fill="#d4a574" opacity="0.7"/>
  </g>
  <!-- Small sparkle right -->
  <g transform="translate(42, 8)">
    <path d="M0 -2 L0.5 -0.6 L2 0 L0.5 0.6 L0 2 L-0.5 0.6 L-2 0 L-0.5 -0.6 Z" fill="#d4a574" opacity="0.5"/>
  </g>
  <!-- Tiny sparkle dot -->
  <circle cx="28" cy="10" r="0.8" fill="#d4a574" opacity="0.4"/>
  <!-- Root/base flourish -->
  <path d="M18 58 C19 54, 20 56, 22 58" stroke="#40916c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
